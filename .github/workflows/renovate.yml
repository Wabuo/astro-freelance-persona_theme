name: Renovate
on:
  workflow_dispatch:
  schedule:
    # Run daily at 03:27 UTC (using a non-zero minute to avoid top-of-the-hour GitHub Actions queue spikes)
    - cron: '27 3 * * *'

concurrency: renovate

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-24.04
    steps:
      - name: Harden Host Egress Traffic
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Renovate Agent
        uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
