name: Generate Baselines

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  generate:
    name: Generate Playwright Baselines
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install Dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Setup Playground
        run: bun run playground:setup

      - name: Install Playwright Browsers
        run: bunx playwright install chromium firefox --with-deps

      - name: Update Snapshots
        run: |
          cd playground
          bun run test --update-snapshots
          cp -r testing/tests/*-snapshots/ ../theme/starter/testing/tests/

      - name: Save Snapshots Cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            theme/starter/testing/tests/**/*-snapshots
          key: snapshots-${{ github.sha }}
