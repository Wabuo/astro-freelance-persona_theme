name: CI Gatekeeper

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'theme/**'
      - 'package.json'
      - 'bun.lock'
      - 'renovate.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Betterleaks (Security)
        uses: docker://ghcr.io/betterleaks/betterleaks:v1.3.1
        with:
          args: detect -v

      - name: Verify Changeset Presence
        if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
        run: |
          changeset_count=$(find .changeset -maxdepth 1 -name "*.md" ! -name "README.md" | grep -c "")
          if [ "$changeset_count" -eq 0 ]; then
            echo "🛑 ERROR: No changeset file found in .changeset/!"
            echo "Please run 'bunx changeset' to generate release notes for your changes."
            exit 1
          fi
          echo "✅ Changeset verified."

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install Dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Check if Renovate Config Changed
        id: check-renovate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} | grep -q 'renovate.json'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate Renovate Configuration
        if: steps.check-renovate.outputs.changed == 'true'
        run: bunx --package renovate renovate-config-validator

      - name: Setup Playground
        run: bun run playground:setup

      - name: Astro Static Analysis (Fail Fast)
        run: bun run check

  visual-tests:
    name: Playwright Visual Regression
    needs: validate
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'run-visual-tests')
    runs-on: ubuntu-24.04
    environment: visual-tests
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install Dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Setup Playground
        run: bun run playground:setup

      - name: Fetch Playwright Snapshots
        id: snapshot-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            theme/starter/testing/tests/**/*-snapshots
          key: snapshots-${{ github.event.pull_request.base.sha }}

      - name: Install Playwright Browsers
        if: steps.snapshot-cache.outputs.cache-hit == 'true'
        run: bunx playwright install chromium firefox --with-deps

      - name: Run Playwright Tests
        if: steps.snapshot-cache.outputs.cache-hit == 'true'
        run: bun run test

      - name: Auto-trigger Baseline Generator
        if: steps.snapshot-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🛑 Snapshots missing or expired!"
          echo "Attempting to trigger the Baseline Generator workflow on main to rebuild artifacts..."
          if gh workflow run "Generate Baselines" --ref main; then
            echo "✅ Build triggered. Please wait a couple of minutes for it to finish, then re-run this PR check."
          else
            echo "⚠️ Notice: Unable to auto-trigger the baseline builder (this is expected for PRs from forks due to GitHub token restrictions)."
            echo "👉 Please manually run the 'Generate Baselines' workflow from the Actions tab in the GitHub UI."
          fi
          exit 1
