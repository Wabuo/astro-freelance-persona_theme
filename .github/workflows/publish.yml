name: Secure Theme Package Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Quality Gate
    runs-on: ubuntu-24.04
    steps:
      - name: Harden Host Egress Traffic
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443

      - name: Checkout Workspace State
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Safe Sync Dependencies Without Lifecycle Scripts
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Validate Layout & Components Structural Health
        run: bun run check

  publish:
    name: Hardened Registry Publication
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Harden Host Egress Traffic
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            registry.npmjs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            token.actions.githubusercontent.com:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Checkout Workspace State
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Confirm Working Directory Integrity Matches Origin Commit
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "🚨 CRITICAL VIOLATION: Working space dirty. Something altered code files during execution. Halt."
            git status
            exit 1
          fi

      - name: Initialize Sterile Node/npm Framework
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm to Latest Version
        run: npm install -g npm@latest

      - name: Dry Run Manifest Audit
        run: npm pack --dry-run
        working-directory: theme

      - name: Cryptographic Trusted Publication With Public Code Provenance
        run: |
          TAG=$(node -p "const v = require('./package.json').version; v.includes('-') ? v.split('-')[1].split('.')[0] : ''")
          if [ -n "$TAG" ]; then
            echo "📦 Publishing pre-release version with tag: $TAG"
            npm stage publish --provenance --access public --tag "$TAG"
          else
            echo "📦 Publishing stable version to latest"
            npm stage publish --provenance --access public
          fi
        working-directory: theme
